services:
  - type: web            # тип сервиса (web, background, static)
    name: lightsout-bot  # имя сервиса в Render
    env: golang          # используем Go образ (Render автоматически ставит golang:1.x)
    
    # Команды для сборки и запуска бота на Go
    buildCommand: cd /testbed && go mod download && go build -o main ./bot
    
    startCommand: ./main
    
    # Описание переменных окружения:
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        fromSecret: telegram_bot_token  # ссылка на Render секрет