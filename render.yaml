services:
  - type: web            # тип сервиса (web, background, static)
    name: telegram-bot   # имя сервиса в Render
    env: python          # используем Python‑образ (Render автоматически ставит python:3.x)
    buildCommand: pip install -r requirements.txt
    startCommand: python -m bot

    # Описание переменных окружения:
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        fromSecret: telegram_bot_token   # <-- ссылка на Render‑секрет
