version: '3'

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    command: go run ./cmd/bot/
    volumes:
      - .:/app
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: go run ./cmd/web/
    volumes:
      - .:/app
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=lightsout
      - DB_USER=lightsout_user
      - DB_PASSWORD=lightsout_pass

volumes:
  db_data:
